<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    

    <!-- INICIO - Importação da lib ALGOL WEB -------------------------------->
    <link id="theme-link" rel="stylesheet" href="/algol-web/algol-light.css">
    <script src="/algol-web/scripts/variaveis.js" ></script>
    <script src="/algol-web/scripts/bases/base_component.js" ></script>
    <script src="/algol-web/scripts/bases/base_layout.js" ></script>
    <script src="/algol-web/scripts/components/inputs.js" ></script>
    <script src="/algol-web/scripts/components/buttons.js" ></script>
    <script src="/algol-web/scripts/components/textarea.js" ></script>
    <script src="/algol-web/scripts/components/select.js" ></script>
    <script src="/algol-web/scripts/components/image.js" ></script>
    <script src="/algol-web/scripts/components/spacer.js" ></script>
    <script src="/algol-web/scripts/components/power_menu.js" ></script>
    <script src="/algol-web/scripts/components/checkables.js" ></script>
    <script src="/algol-web/scripts/layouts/grid-layout.js" ></script>
    <script src="/algol-web/scripts/layouts/grid-item.js" ></script>
    <script src="/algol-web/scripts/layouts/flex-item.js" ></script>
    
    <!-- <script src="/algol-web/min.js"></script> -->
    <!-- FIM - Importação da lib ALGOL WEB ------------------------------------>
    
    <!-- INICIO - Importação da lib ALGOL SPA --------------------------------->
    <script src="/algol-spa/page_base.js" defer></script>
    <script src="/algol-spa/router.js" defer></script>
    <!-- <script src="/algol-spa/min.js"></script> -->
    <!-- FIM - Importação da lib ALGOL SPA ------------------------------------>

    <!-- INICIO - Importação das páginas da aplicação ------------------------->
    <script src="/pages/menu.js" defer></script>
    <script src="/pages/footer.js" defer></script>
    <script src="/pages/home.js" defer></script>
    <script src="/pages/posts.js" defer></script>
    <script src="/pages/publications.js" defer></script>
    <script src="/pages/404.js" defer></script>  
    <script src="/pages/single.js" defer></script>
    
    <!-- <script src="/pages/min.js"></script> -->
    <!-- FIM - Importação das páginas da aplicação ---------------------------->

    
    
    <link rel="stylesheet" href="/css/fonts.css">
    <style>
        @media(max-width: 1280px    ){
            #layout-screen{
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <algol-grid-layout id="layout-screen" posh="stretch" cols="0.1fr 0.8fr 0.1fr" colsbreak="1fr">
        <algol-grid-item></algol-grid-item>
        
        <algol-grid-item id="app">        
            <div id="menu-container"></div>

            <algol-spacer value="1" valuebreak="3"></algol-spacer>
            
            <main id="spa-container" style="width: 100%;"></main>

            <div id="footer-container"></div>
            
        <algol-grid-item></algol-grid-item>
    </algol-grid-layout>

    <script defer>
        const IMAGE_BUCKET = 'http://localhost:8080'; // fazer com que este valor seja enviado pleo servidor no request da rota '/'

        const currentLang = localStorage.getItem('app_lang') || 'pt-br'; // lê no localstorage o idioma atual
        document.documentElement.lang = currentLang; // atualiza o idioma da página
        
        document.addEventListener("DOMContentLoaded", async () => {
            await window.initRouter('menu-container', 'spa-container', 'footer-container');
        });
    </script>

</body>
</html>
